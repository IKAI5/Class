<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부경대 사회복지실무역량</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f6f6f8;color:#555}
header{text-align:center;padding:35px;border-bottom:8px solid #aeb5df}
h1{font-size:clamp(3rem,8vw,6rem);color:#aeb5df;margin:0}
p{line-height:1.7}
nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap;padding:20px}
nav button{
background:#fff;border:1px solid #d8dcf0;color:#7f88c9;
padding:12px 18px;border-radius:12px;font-weight:bold;cursor:pointer;
}
nav button:hover{background:#eef0ff}
.panel{
display:none;max-width:1000px;margin:20px auto;
background:#fff;padding:25px;border:1px solid #d8dcf0;border-radius:14px;
}
.panel.active{display:block}
.news li{margin:10px 0}
.box{background:#fafafe;border:1px solid #d8dcf0;padding:15px;border-radius:10px}
a{color:#6f79c7;text-decoration:none}
</style>
</head>
<body>

<header>
<h1>부경대 사회복지실무역량</h1>
<p>🍊 귤 홍보 · 🌤 부산 날씨 · 📰 부산 뉴스 · 🎓 부경대 정보 · 📊 사회복지 통계</p>
</header>

<nav>
<button onclick="showTab('home')">🍊 HOME</button>
<button onclick="showTab('weather')">🌤 날씨</button>
<button onclick="showTab('busan')">📰 부산 뉴스</button>
<button onclick="showTab('pknu')">🎓 부경대</button>
<button onclick="showTab('welfare')">📊 통계</button>
</nav>

<div id="home" class="panel active">
<h2>🍊 제주 귤 홍보관</h2>
<p>
제주의 햇살과 바람이 만든 귤. 비타민 C가 풍부하고 신선한 맛으로 사랑받는 대표 과일입니다.
</p>
</div>

<div id="weather" class="panel">
<h2>🌤 부산 실시간 날씨</h2>
<div id="weatherBox" class="box">불러오는 중...</div>
</div>

<div id="busan" class="panel">
<h2>📰 부산 최신 뉴스</h2>
<ul id="busanNews" class="news">
<li>불러오는 중...</li>
</ul>
</div>

<div id="pknu" class="panel">
<h2>🎓 부경대학교 정보</h2>
<div class="box">
<a href="https://www.pknu.ac.kr" target="_blank">부경대학교 공식 홈페이지 바로가기</a>
</div>
<p>공지사항 · 장학금 · 학사일정 확인 가능</p>
</div>

<div id="welfare" class="panel">
<h2>📊 사회복지 통계</h2>
<p>고령화율 예시 데이터 시각화</p>
<canvas id="chart"></canvas>
</div>

<script>
function showTab(id){
 document.querySelectorAll('.panel').forEach(v=>v.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

// 부산 날씨
fetch('https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m,relative_humidity_2m')
.then(r=>r.json())
.then(data=>{
 document.getElementById('weatherBox').innerHTML =
 '현재 기온: <b>'+data.current.temperature_2m+'°C</b><br>습도: <b>'+data.current.relative_humidity_2m+'%</b>';
})
.catch(()=>{
 document.getElementById('weatherBox').innerText='날씨 정보를 불러오지 못했습니다.';
});

// 부산 뉴스
fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=부산&hl=ko&gl=KR&ceid=KR:ko')
.then(r=>r.json())
.then(data=>{
 const list=document.getElementById('busanNews');
 list.innerHTML='';
 data.items.slice(0,8).forEach(item=>{
   const li=document.createElement('li');
   li.innerHTML='<a target="_blank" href="'+item.link+'">'+item.title+'</a>';
   list.appendChild(li);
 });
})
.catch(()=>{
 document.getElementById('busanNews').innerHTML='<li>뉴스를 불러오지 못했습니다.</li>';
});

// 사회복지 통계 그래프
new Chart(document.getElementById('chart'),{
 type:'line',
 data:{
   labels:['2021','2022','2023','2024','2025'],
   datasets:[{
     label:'고령화율(예시)',
     data:[16,17.1,18.4,19.8,21.2],
     tension:0.3
   }]
 }
});
</script>

</body>
</html>

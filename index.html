<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부경대 사회복지실무역량</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
body{margin:0;font-family:sans-serif;background:#f6f6f8;color:#555}
header{text-align:center;padding:30px;border-bottom:8px solid #aeb5df}
h1{font-size:clamp(3rem,8vw,6rem);color:#aeb5df}
.nav{display:flex;justify-content:center;gap:10px;padding:20px;flex-wrap:wrap}
.nav button{
background:#fff;border:1px solid #d8dcf0;padding:12px 18px;
cursor:pointer;color:#7f88c9;font-weight:bold;border-radius:8px;
}
.nav button:hover{background:#eef0ff}
.panel{display:none;max-width:1000px;margin:20px auto;background:#fff;padding:25px;border:1px solid #d8dcf0}
.panel.active{display:block}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px}
.box{background:#fafafe;border:1px solid #d8dcf0;padding:15px}
</style>
</head>
<body>

<header>
<h1>부경대 사회복지실무역량</h1>
<p>귤 홍보 · 부산 정보 · 사회복지 데이터 플랫폼</p>
</header>

<div class="nav">
<button onclick="showTab('home')">🍊 HOME</button>
<button onclick="showTab('weather')">🌤 날씨</button>
<button onclick="showTab('busan')">📰 부산 이슈</button>
<button onclick="showTab('pknu')">🎓 부경대 뉴스</button>
<button onclick="showTab('welfare')">📊 사회복지 통계</button>
</div>

<div id="home" class="panel active">
<h2>🍊 제주 귤 홍보관</h2>
<p>비타민 C가 풍부한 제주 귤을 소개합니다.</p>
</div>

<div id="weather" class="panel">
<h2>🌤 부산 날씨</h2>
<div id="weatherBox">날씨 정보를 불러오는 중...</div>
</div>

<div id="busan" class="panel">
<h2>📰 부산 이슈</h2>
<ul id="busanNews">
<li>부산 관광 활성화 정책</li>
<li>지역 경제 및 항만 산업 동향</li>
<li>부산 국제행사 및 축제 정보</li>
</ul>
</div>

<div id="pknu" class="panel">
<h2>🎓 부경대학교 뉴스</h2>
<ul>
<li><a href="https://www.pknu.ac.kr" target="_blank">부경대학교 공식 홈페이지 방문</a></li>
<li>공지사항 및 학사정보 확인 가능</li>
</ul>
</div>

<div id="welfare" class="panel">
<h2>📊 사회복지 통계</h2>
<canvas id="chart"></canvas>
</div>

<script>
function showTab(id){
 document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
 document.getElementById(id).classList.add('active');
}

fetch("https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m")
.then(r=>r.json())
.then(data=>{
document.getElementById("weatherBox").innerHTML=
"현재 부산 기온: <b>"+data.current.temperature_2m+"°C</b>";
})
.catch(()=>{
document.getElementById("weatherBox").innerText="날씨 정보를 가져오지 못했습니다.";
});

new Chart(document.getElementById('chart'),{
type:'bar',
data:{
labels:['2022','2023','2024','2025'],
datasets:[{
label:'사회복지 서비스 이용률(예시)',
data:[60,67,71,78]
}]
}
});
</script>

</body>
</html>

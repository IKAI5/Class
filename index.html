<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>부경대 사회복지실무역량</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>
html{scroll-behavior:smooth}
body{margin:0;font-family:'Noto Sans KR',sans-serif;background:#f6f6f8;color:#555}
header{text-align:center;padding:40px;border-bottom:8px solid #aeb5df}
h1{font-size:clamp(3rem,8vw,6rem);color:#aeb5df;margin:0}
nav{
position:sticky;top:0;background:white;
display:flex;justify-content:center;gap:10px;flex-wrap:wrap;
padding:15px;border-bottom:1px solid #d8dcf0;z-index:1000;
}
nav a{
text-decoration:none;background:#fff;border:1px solid #d8dcf0;
padding:10px 16px;border-radius:10px;color:#7f88c9;font-weight:bold;
}
section{padding:60px 20px}
.card{
max-width:1000px;margin:auto;background:white;
padding:25px;border:1px solid #d8dcf0;border-radius:14px;
}
.news li{margin:10px 0}
.box{background:#fafafe;border:1px solid #d8dcf0;padding:15px;border-radius:10px}
a.link{color:#6f79c7}
</style>
</head>
<body>

<header>
<h1>부경대 사회복지실무역량</h1>
<p>🍊 귤 홍보 · 🌤 부산 날씨 · 📰 부산 뉴스 · 🎓 부경대 정보 · 📊 사회복지 통계</p>
</header>

<nav>
<a href="#home">🍊 HOME</a>
<a href="#weather">🌤 날씨</a>
<a href="#busan">📰 부산 뉴스</a>
<a href="#pknu">🎓 부경대</a>
<a href="#welfare">📊 통계</a>
</nav>

<section id="home">
<div class="card">
<h2>🍊 제주 귤 홍보관</h2>
<p>제주의 햇살과 바람이 만든 귤. 비타민 C가 풍부하고 신선한 맛으로 사랑받는 대표 과일입니다.</p>
</div>
</section>

<section id="weather">
<div class="card">
<h2>🌤 부산 실시간 날씨</h2>
<div id="weatherBox" class="box">불러오는 중...</div>
</div>
</section>

<section id="busan">
<div class="card">
<h2>📰 부산 최신 뉴스</h2>
<ul id="busanNews" class="news">
<li>불러오는 중...</li>
</ul>
</div>
</section>

<section id="pknu">
<div class="card">
<h2>🎓 부경대학교 정보</h2>
<p><a class="link" href="https://www.pknu.ac.kr" target="_blank">부경대학교 공식 홈페이지 바로가기</a></p>
</div>
</section>

<section id="welfare">
<div class="card">
<h2>📊 사회복지 통계</h2>
<canvas id="chart"></canvas>
</div>
</section>

<script>
fetch('https://api.open-meteo.com/v1/forecast?latitude=35.1796&longitude=129.0756&current=temperature_2m,relative_humidity_2m')
.then(r=>r.json())
.then(data=>{
document.getElementById('weatherBox').innerHTML =
'현재 기온: <b>'+data.current.temperature_2m+'°C</b><br>습도: <b>'+data.current.relative_humidity_2m+'%</b>';
});

fetch('https://api.rss2json.com/v1/api.json?rss_url=https://news.google.com/rss/search?q=부산&hl=ko&gl=KR&ceid=KR:ko')
.then(r=>r.json())
.then(data=>{
const list=document.getElementById('busanNews');
list.innerHTML='';
(data.items||[]).slice(0,8).forEach(item=>{
const li=document.createElement('li');
li.innerHTML='<a class="link" href="'+item.link+'" target="_blank">'+item.title+'</a>';
list.appendChild(li);
});
});

new Chart(document.getElementById('chart'),{
type:'line',
data:{
labels:['2021','2022','2023','2024','2025'],
datasets:[{label:'고령화율(예시)',data:[16,17.1,18.4,19.8,21.2]}]
}
});
</script>

</body>
</html>
